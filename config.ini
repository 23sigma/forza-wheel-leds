[settings]
; UDP port — must match "Data Out IP Port" in-game (default: 5607)
udp_port = 5607

; Fraction of max RPM at which the FIRST LED lights up (0.0 – 1.0)
;   0.65 → first LED at 65 % of redline  (recommended)
;   0.50 → first LED at 50 % of redline  (earlier, more LEDs visible at low RPM)
led_min_rpm_ratio = 0.65

; Rev-limiter blink: all LEDs flash above this fraction of max RPM (0.0 – 1.0)
;   0.90 → blink starts at 90 % of redline  (recommended — clear shift point)
;   0.97 → blink starts at 97 % of redline  (very late, almost at limiter)
blink_rpm_ratio = 0.90

; Blink frequency in Hz
blink_hz = 10

[forward]
; Forward the raw telemetry stream to additional destinations.
; Useful if you also run a sim-racing companion app (e.g. on your phone).
; Set the Forza Data Out port to 5607 on 127.0.0.1 — this tool receives it
; and rebroadcasts to every target listed here.
;
; Format: comma-separated list of  host:port
; Example (phone on local network + another app on the same PC):
;   targets = 192.168.1.42:5607, 127.0.0.1:5608
;
; Leave blank or remove this section to disable forwarding.
targets =
