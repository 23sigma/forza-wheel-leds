[settings]
; UDP port — must match "Data Out IP Port" in-game (default: 5607)
udp_port = 5607

; Fraction of max RPM at which the FIRST LED lights up (0.0 – 1.0)
;   0.65 → first LED at 65 % of redline  (recommended)
;   0.50 → first LED at 50 % of redline  (earlier, more LEDs visible at low RPM)
led_min_rpm_ratio = 0.65

; Rev-limiter blink: all LEDs flash above this fraction of max RPM (0.0 – 1.0)
;   0.87 → blink starts at 87 % of redline  (recommended — clear shift point)
;   0.97 → blink starts at 97 % of redline  (very late, almost at limiter)
blink_rpm_ratio = 0.87

; Blink frequency in Hz
blink_hz = 10
