name: Build Windows .exe

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build .exe
        run: |
          pyinstaller --onefile --console --name forza_wheel_leds forza_wheel_leds.py

      - name: Create release archive
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $dir = "forza_wheel_leds_$tag"
          New-Item -ItemType Directory -Path $dir
          Copy-Item dist\forza_wheel_leds.exe $dir\
          Copy-Item README.md $dir\
          Copy-Item LICENSE $dir\
          # Add a reminder file about the DLL
          $txt = "Place LogitechSteeringWheelEnginesWrapper.dll here (next to forza_wheel_leds.exe).`n`nDownload the Logitech Steering Wheel SDK:`nhttps://www.logitechg.com/sdk/LogitechSteeringWheelSDK_8.75.30.zip"
          $txt | Out-File -FilePath "$dir\PUT_LOGITECH_DLL_HERE.txt" -Encoding utf8
          Compress-Archive -Path $dir -DestinationPath "forza_wheel_leds_$tag.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "forza-wheel-leds ${{ github.ref_name }}"
          body: |
            ## forza-wheel-leds ${{ github.ref_name }}

            ### Installation
            1. Download `forza_wheel_leds_${{ github.ref_name }}.zip` and extract it.
            2. Copy `LogitechSteeringWheelEnginesWrapper.dll` from the [Logitech Steering Wheel SDK](https://www.logitechg.com/sdk/LogitechSteeringWheelSDK_8.75.30.zip) into the extracted folder.
            3. Configure Forza Data Out (see README).
            4. Run `forza_wheel_leds.exe`.

            ### Requirements
            - Windows 10 / 11
            - Logitech G HUB installed and running
            - Logitech Steering Wheel SDK DLL (see above)
          files: "forza_wheel_leds_${{ github.ref_name }}.zip"
          draft: false
          prerelease: false
