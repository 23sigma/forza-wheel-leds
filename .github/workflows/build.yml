name: CI

on:
  push:
    branches: ["main"]
    tags:
      - "v*.*.*"
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Job: Build .exe + GitHub Release (Windows, on tag only)
  # ---------------------------------------------------------------------------
  build:
    name: Build Windows .exe
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install pyinstaller

      - name: Download hidapi.dll
        shell: pwsh
        run: |
          $url = "https://github.com/libusb/hidapi/releases/download/hidapi-0.14.0/hidapi-win.zip"
          Invoke-WebRequest -Uri $url -OutFile hidapi-win.zip
          Expand-Archive -Path hidapi-win.zip -DestinationPath hidapi-win
          Copy-Item hidapi-win\x64\hidapi.dll .

      - name: Build .exe
        run: pyinstaller --onefile --console --name forza_wheel_leds --add-binary "hidapi.dll;." forza_wheel_leds.py

      - name: Create release archive
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $dir = "forza_wheel_leds_$tag"
          New-Item -ItemType Directory -Path $dir
          Copy-Item dist\forza_wheel_leds.exe $dir\
          Copy-Item README.md $dir\
          Copy-Item LICENSE $dir\
          Copy-Item config.ini $dir\
          Compress-Archive -Path $dir -DestinationPath "forza_wheel_leds_$tag.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "forza-wheel-leds ${{ github.ref_name }}"
          body: |
            ## forza-wheel-leds ${{ github.ref_name }}

            ### Installation
            1. Download `forza_wheel_leds_${{ github.ref_name }}.zip` and extract it.
            2. Configure Forza Data Out (see README).
            3. Plug in your G29 or G920 via USB.
            4. Run `forza_wheel_leds.exe` — that's it. No G HUB required.

            ### Requirements
            - Windows 10 / 11
            - Logitech G29 or G920 plugged in via USB
          files: "forza_wheel_leds_${{ github.ref_name }}.zip"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
